<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Student Data Entry</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    </head>

    <body>

        <!-- Navbar -->

        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

            <div class="container">

                <a class="navbar-brand fw-bold" href="#">
                       Student Performance Prediction
                </a>

                <div>

                    <a class="nav-link d-inline text-white" href="/dashboard">Dashboard</a>

                    <a class="nav-link d-inline text-white" href="/predict">Student Data Entry</a>

                    <a class="nav-link d-inline text-white" href="/records">Student Records</a>

                    <a class="nav-link d-inline text-white" href="/report">Reports</a>

                    <a class="nav-link d-inline text-white" href="/">Logout</a>

                </div>

            </div>

        </nav>


        <div class="container mt-5">

            <div class="card shadow-lg p-5">

                <h2 class="text-center text-primary mb-5">

                    Student Data Entry

                </h2>

                <form action="/result" method="POST">

                    <div class="row">

                        <div class="col-md-6">

                            <label>Student ID</label>

                            <input type="text" class="form-control mb-3" name="student_id" required>

                            <label>Age</label>

                            <input type="number" class="form-control mb-3" name="age" required>

                            <label>Branch</label>

                            <select class="form-control mb-3" name="branch">

                                <option>CSE</option>

                                <option>IT</option>

                                <option>ECE</option>

                                <option>EEE</option>

                                <option>Mechanical</option>

                                <option>Civil</option>

                            </select>

                            <label>Attendance (%)</label>

                            <input type="number" class="form-control mb-3" name="attendance" required>

                            <label>Previous Semester Percentage</label>

                            <input
                            type="number"
                            class="form-control mb-3"
                            name="previous_percentage"
                            required>

                            <label>Assignment Marks</label>

                            <input type="number" class="form-control mb-3" name="assignment" required>

                        </div>

                        <div class="col-md-6">

                            <label>Student Name</label>

                            <input type="text" class="form-control mb-3" name="student_name" required>

                            <label>Gender</label>

                            <select class="form-control mb-3" name="gender">

                                <option>Male</option>

                                <option>Female</option>

                                <option>Other</option>

                            </select>

                            <label>Semester</label>

                            <select class="form-control mb-3" name="semester" required>

                                <option value="">Select Semester</option>

                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>
                                <option>5</option>
                                <option>6</option>
                                <option>7</option>
                                <option>8</option>

                            </select>

                            <label>Internal Marks</label>

                            <input
                            type="number"
                            class="form-control mb-3"
                            name="internal_marks"
                            required>

                            <label>Study Hours Per Day</label>

                            <input
                            type="number"
                            class="form-control mb-3"
                            name="study_hours"
                            required>

                            <label>Participated in Activities</label>

                            <select class="form-control mb-3" name="activities">

                                <option>Yes</option>

                                <option>No</option>

                            </select>
                            
                            <div class="text-center mt-4">

                                <button
                                 type="submit"
                                 class="btn btn-primary btn-lg">

                                 Predict Performance

                                </button>

                            </div>
                        </div>     
                    </div>
                </form>

            </div>

        </div>

    </body>

</html>
